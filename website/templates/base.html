{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MetroMed - Sistema de Gamificación</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap LOCAL (sin CDN) -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/custom.css' %}" rel="stylesheet">
    <link href="{% static 'gamification/css/metrocoins.css' %}" rel="stylesheet">
    
    <!-- HTMX LOCAL -->
    <script src="{% static 'js/htmx.min.js' %}"></script>
  </head>
  <body hx-boost="true">
    {% include 'navbar.html' %}
    <div class="container" id="main-content">
        <br/>
            {% block content %}
            {% endblock %}
    </div>
    <!-- Bootstrap JS LOCAL (sin CDN) -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
  </body>
</html>
