{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="orbitron text-warning">⚙️ Gestión de Juegos</h1>
        <div>
            <a href="{% url 'admin_stats' %}" class="btn btn-outline-warning me-2">Ver Estadísticas</a>
            <a href="{% url 'game_lobby' %}" class="btn btn-outline-secondary">Volver al Lobby</a>
        </div>
    </div>

    <div class="row g-4">
        {% for game in games %}
        <div class="col-md-6">
            <div class="card p-4 h-100 border-{% if game.is_active %}success{% else %}secondary{% endif %}">
                <form method="POST" action="{% url 'admin_games' %}">
                    {% csrf_token %}
                    <input type="hidden" name="game_name" value="{{ game.name }}">
                    
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h4 class="orbitron text-capitalize mb-0">{{ game.get_name_display }}</h4>
                        <div class="form-check form-switch fs-5">
                            <input class="form-check-input" type="checkbox" role="switch" id="switch{{ game.id }}" name="is_active" {% if game.is_active %}checked{% endif %} onchange="this.form.submit()">
                            <label class="form-check-label text-muted fs-6" for="switch{{ game.id }}">
                                {% if game.is_active %}Activo{% else %}Inactivo{% endif %}
                            </label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">Monedas por unidad / acción</label>
                        <input type="number" class="form-control bg-dark text-light border-secondary" name="coins_per_unit" value="{{ game.coins_per_unit }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small">Límite máximo por sesión</label>
                        <input type="number" class="form-control bg-dark text-light border-secondary" name="max_coins" value="{{ game.max_coins_per_session }}">
                    </div>
                    
                    <button type="submit" class="btn btn-sm btn-outline-warning w-100">Guardar Cambios de Monedas</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
